# Qwen2.5-Omni STT Training for Hindi (Shrutilipi dataset)
# Speech-to-Text: Audio -> Text transcription

model_name_or_path: Qwen/Qwen2.5-Omni-7B
template: qwen2_omni

# STT Mode - Use Thinker only (not TTS)
train_tts: false

# Dataset
dataset: shrutilipi_hindi

# Training Method
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
use_rslora: true

# Audio encoder - TRAINABLE for Hindi adaptation
freeze_audio_encoder: false
freeze_vision_tower: true

# Training Settings
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_find_unused_parameters: false

# Sequence Length
cutoff_len: 512
# Audio is processed by audio encoder, cutoff applies to text output

# Evaluation
val_size: 0.01
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100

# Saving
output_dir: saves/qwen25omni-lora-stt-hindi
logging_steps: 10
save_steps: 500
plot_loss: true

# Optimization
# If OOM, enable gradient checkpointing
# gradient_checkpointing: true
# max_grad_norm: 1.0
