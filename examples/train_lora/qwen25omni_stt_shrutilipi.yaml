# Qwen2.5-Omni STT Training on Shrutilipi Hindi Dataset
# Direct streaming from HF Hub with audio bytes

### run (required: HF TrainingArguments defaults do_train to false)
stage: sft
do_train: true

model_name_or_path: Qwen/Qwen2.5-Omni-7B
template: qwen2_omni

# STT Mode - Thinker only (audio encoder -> LLM)
train_tts: false  # Important: Only thinker is loaded

# Dataset - Streaming with minimal buffer
dataset: shrutilipi_hindi
streaming: true  # Re-enabled to avoid loading full dataset
buffer_size: 128  # Minimal buffer for stability

# Audio column mapping (audio_filepath contains bytes, not path)
# Already configured in dataset_info.json:
#   audio: audio_filepath  -> maps to audio column
#   prompt: text          -> maps to text/transcription

# Audio path: allow LoRA on audio_tower (freeze_vision_tower=false). freeze_audio_encoder only applies in TTS full-model mode.
freeze_vision_tower: false
freeze_audio_encoder: false

# LoRA — very high rank (e.g. 512) can OOM or crash native code during PEFT attach; start moderate and increase if stable
finetuning_type: lora
lora_target: all
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05
use_rslora: true

# Keep adapter weights in bf16 (often more stable on ROCm than default fp32-upcast for LoRA)
pure_bf16: true

# Training
bf16: true  # Recommended on MI300X / ROCm (avoids fp32-only path warnings)
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4  # Higher LR for adapter tuning
num_train_epochs: -1  # Disabled in streaming
max_steps: 1000  # Test with 1000 steps first
max_samples: null  # Use streaming samples
logging_steps: 1  # Log every step to track progress

# Sequence length
cutoff_len: 1024  # Audio transcription doesn't need long context

# Optimizer
lr_scheduler_type: cosine
warmup_steps: 100  # ~5% of first epoch

# Gradient checkpointing for memory saving
gradient_checkpointing: true

# Streaming settings
preprocessing_num_workers: null  # Disabled in streaming mode
dataloader_num_workers: 2

# Evaluation
val_size: 0.0  # No validation split in streaming (or use eval_dataset)
# eval_dataset: eval_set  # If you have a separate eval dataset

# Saving
output_dir: saves/qwen25omni-lora-stt-hindi
save_steps: 500
save_strategy: steps
save_total_limit: 5  # Keep only last 5 checkpoints to save space
plot_loss: true
report_to: wandb  # Optional: track training

# Debugging and logging
log_level: debug  # Maximum verbosity for debugging
logging_first_step: true  # Log first step
dataloader_pin_memory: false  # Reduce memory usage
neftune_noise_alpha: 0  # Disable NEFTune for stability

# Stability settings
max_grad_norm: 1.0  # Gradient clipping

# Export
export_dir: exports/qwen25omni-lora-stt-hindi

# Hardware (AMD MI300X)
flash_attn: disabled  # FA2 not available on ROCm, use PyTorch native attn
use_reentrant_gc: false  # Non-reentrant checkpointing is often more stable with PEFT on ROCm
# Or if you have ROCm Flash Attention:
# flash_attn: auto

# GPU Settings
# Or for single GPU without DeepSpeed:
# low_cpu_mem_usage: true

# Note: 
# - Audio bytes from 'audio_filepath' column are processed directly
# - Text from 'text' column is the transcription target
# - Streaming mode allows training on full 50GB+ dataset without downloading

# Single GPU settings (no DeepSpeed)
low_cpu_mem_usage: true
