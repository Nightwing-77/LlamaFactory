# ==========================================
# Training Settings
# ==========================================
stage: sft
do_train: true

# ==========================================
# Model Settings
# ==========================================
model_name_or_path: Qwen/Qwen3-Omni-30B-A3B-Instruct
template: qwen3_omni
trust_remote_code: true

# ==========================================
# STT Settings (Speech-to-Text)
# ==========================================
train_tts: false              # Disable TTS
freeze_audio_encoder: false    # Unfreeze audio encoder for STT
freeze_codec_head: true        # Freeze codec head for STT
audio_codec_vocab_size: 16000

# LoRA Settings
finetuning_type: lora
lora_target: q_proj, v_proj, k_proj, o_proj
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.03
use_rslora: true
pure_bf16: true

# ==========================================
# Dataset
# ==========================================
dataset: lahaja_stt           # Lahaja STT dataset
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 4

# ==========================================
# Output & Logging
# ==========================================
output_dir: saves/qwen3omni-30b/lora/stt-lahaja
overwrite_output_dir: true
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 3.0e-5       # Lower LR for STT
num_train_epochs: 5.0        # STT training epochs
max_steps: -1
lr_scheduler_type: cosine
warmup_ratio: 0.1

# ==========================================
# Evaluation & Saving
# ==========================================
eval_steps: 500
save_steps: 500
save_strategy: steps
save_total_limit: 3
logging_steps: 10

# ==========================================
# Optimization & Memory
# ==========================================
flash_attn: disabled
gradient_checkpointing: false
max_grad_norm: 1.0

# ==========================================
# Mixed Precision
# ==========================================
bf16: true
fp16: false
tf32: false

# ==========================================
# LoRA Specific
# ==========================================
# pissa and dora are not used

# ==========================================
# Export
# ==========================================
export_dir: exports/qwen3omni-lora-stt-lahaja

# ==========================================
# Report to
# ==========================================
report_to: wandb
run_name: qwen3omni-stt-lahaja

# ==========================================
# Hardware
# ==========================================
dataloader_pin_memory: false
neftune_noise_alpha: 0
low_cpu_mem_usage: false
use_reentrant_gc: false
